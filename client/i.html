<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LexAI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<style>
:root{
  --bg:#0f172a;
  --card:#111827;
  --text:#e5e7eb;
  --accent:#6366f1;
}

.light{
  --bg:#f9fafb;
  --card:#ffffff;
  --text:#111827;
}

body{
  margin:0;
  font-family:Poppins;
  background:var(--bg);
  color:var(--text);
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:auto;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  padding:12px 20px;
  background:var(--card);
  position:sticky;
  top:0;
}

.toggle{
  cursor:pointer;
}

/* CHAT */
.messages{
  flex:1;
  overflow-y:auto;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:15px;
}

.msg{
  display:flex;
}

.msg.user{
  justify-content:flex-end;
}

.bubble{
  padding:12px 16px;
  border-radius:10px;
  max-width:60%;
}

.user .bubble{
  background:var(--accent);
  color:white;
}

.ai .bubble{
  background:var(--card);
}

/* INPUT */
.input{
  display:flex;
  padding:10px;
  background:var(--card);
}

textarea{
  flex:1;
  resize:none;
}

button{
  margin-left:10px;
}

/* typing */
.typing{
  font-size:20px;
  opacity:0.6;
}
</style>
</head>

<body>

<header>
  <div>⚖️ LexAI</div>
  <div>
    <span class="toggle" onclick="toggleTheme()">🌙☀️</span>
  </div>
</header>

<div class="messages" id="chat"></div>

<div class="input">
  <textarea id="input"></textarea>
  <button onclick="startVoice()">🎤</button>
  <button onclick="send()">Send</button>
</div>

<script>
let chat=document.getElementById("chat");

/* THEME */
function toggleTheme(){
  document.body.classList.toggle("light");
  localStorage.setItem("theme",document.body.classList.contains("light"));
}

if(localStorage.getItem("theme")==="true"){
  document.body.classList.add("light");
}

/* CHAT SAVE */
function saveChat(){
  localStorage.setItem("chat",chat.innerHTML);
}
function loadChat(){
  chat.innerHTML=localStorage.getItem("chat")||"";
}
loadChat();

/* ADD MESSAGE */
function addMsg(role,text){
  let div=document.createElement("div");
  div.className="msg "+role;

  let bubble=document.createElement("div");
  bubble.className="bubble";
  bubble.innerHTML=text;

  div.appendChild(bubble);
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;

  saveChat();
}

/* STREAM EFFECT */
function streamText(el,text){
  let i=0;
  let interval=setInterval(()=>{
    el.innerHTML+=text[i];
    i++;
    chat.scrollTop=chat.scrollHeight;
    if(i>=text.length) clearInterval(interval);
  },10);
}

/* SEND */
async function send(){
  let input=document.getElementById("input");
  let text=input.value.trim();
  if(!text) return;

  addMsg("user",text);
  input.value="";

  let typing=document.createElement("div");
  typing.className="msg ai";
  typing.innerHTML='<div class="bubble typing">...</div>';
  chat.appendChild(typing);

  try{
    let res=await fetch("http://localhost:5000/api/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:text})
    });

    let data=await res.json();

    typing.remove();

    let div=document.createElement("div");
    div.className="msg ai";
    let bubble=document.createElement("div");
    bubble.className="bubble";
    div.appendChild(bubble);
    chat.appendChild(div);

    streamText(bubble,data.reply || "Error");

  }catch(e){
    typing.remove();
    addMsg("ai","Error: "+e.message);
  }
}

/* VOICE INPUT */
function startVoice(){
  let recognition=new(window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang="en-US";

  recognition.onresult=function(e){
    document.getElementById("input").value=e.results[0][0].transcript;
  };

  recognition.start();
}
</script>

</body>
</html>
